name: Build Android APK

# Build the Zarpay Android APK on a GitHub Actions runner using `eas build --local`.
# The local flag runs the whole Android pipeline on the GH runner instead of
# EAS cloud, so this does NOT count against the EAS free tier 30 builds/month
# quota. Public repos get unlimited Actions minutes, private repos get 2000/month.
#
# Triggers:
#   - Any push to the `demo` branch. Builds a preview APK and refreshes the
#     `demo-latest` GitHub Release so the download URL is stable.
#   - Manual (workflow_dispatch) from the Actions tab for ad-hoc rebuilds.
#
# Prerequisite:
#   Add an `EXPO_TOKEN` secret to the repo (Settings → Secrets → Actions).
#   Generate a token at https://expo.dev/settings/access-tokens

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS profile (preview = APK, production = AAB)"
        default: "preview"
        type: choice
        options:
          - preview
          - production
  push:
    branches:
      - demo

permissions:
  contents: write

jobs:
  build:
    name: Build APK on Ubuntu runner
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      PROFILE: ${{ github.event.inputs.profile || 'preview' }}
      EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "11076708"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Set up Expo + EAS CLI
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK locally
        working-directory: mobile
        run: |
          EXTENSION=$([[ "$PROFILE" == "production" ]] && echo "aab" || echo "apk")
          eas build \
            --platform android \
            --profile "$PROFILE" \
            --local \
            --non-interactive \
            --output "../zarpay-${PROFILE}.${EXTENSION}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: zarpay-${{ env.PROFILE }}
          path: zarpay-${{ env.PROFILE }}.*
          retention-days: 90

      - name: Refresh `demo-latest` GitHub Release
        if: github.ref == 'refs/heads/demo'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: demo-latest
          name: Demo build (latest)
          files: zarpay-${{ env.PROFILE }}.*
          body: |
            Latest Zarpay Android APK, built from commit ${{ github.sha }} on the `demo` branch.
            Built on a GitHub Actions runner via `eas build --local`, zero EAS cloud credits.
            This release is replaced on every push to `demo`, so the download URL stays stable.
          generate_release_notes: false
          make_latest: "true"
